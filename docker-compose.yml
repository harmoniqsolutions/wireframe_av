services:
  postgres:
    image: postgres:16-alpine
    container_name: wireframe-av-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wireframe_av
    ports:
      - "5432:5432"
    volumes:
      - wireframe-av-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wireframe_av"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wireframe-av-postgres:
